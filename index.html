  <style>
    /* Premium Global CSS variables and styling */
    :root {
      --bg-main: #050508;
      --bg-card: #10121C;
      --border-color: #1E2235;
      --text-main: #E8E8F0;
      --text-muted: #9CA3AF;
      --primary: #3B82F6;
      --primary-glow: rgba(59, 130, 246, 0.15);
    }
    
    html, body, #root { 
      height: 100%; 
      margin: 0; 
      background: var(--bg-main); 
      color: var(--text-main);
      font-family: 'DM Sans', 'Segoe UI', sans-serif;
      scroll-behavior: smooth;
    }
    
    button { 
      font: inherit; 
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    
    input {
      font: inherit;
      transition: all 0.25s ease;
    }

    /* Keyframe animations for glowing background elements */
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1) translate(0px, 0px); opacity: 0.2; }
      50% { transform: scale(1.2) translate(15px, -15px); opacity: 0.35; }
    }

    .glow-orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      z-index: 0;
      pointer-events: none;
      animation: pulse-glow 12s infinite alternate ease-in-out;
    }
    
    /* Scrollbar customization */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #08090E;
    }
    ::-webkit-scrollbar-thumb {
      background: #1E2235;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #2D334E;
    }
  </style>

        modules: ["frontend", "sql"],
        materials: [

      },
      {
        id: "devops",
        title: "DevOps Engineer",
        desc: "Automate infrastructure with Docker/Kubernetes, write Terraform configs, run CI/CD, and monitor systems.",
        color: "#EF4444", // Red
        bgColor: "rgba(239, 68, 68, 0.1)",
        borderGlow: "0 4px 15px rgba(239, 68, 68, 0.2)",
        modules: ["devops", "system", "sql"],
        materials: [
          { title: "TechWorld with Nana DevOps Course", url: "https://www.youtube.com/playlist?list=PLdpzxOOAlwvI0O4PeKVV1-yJoX2AqIWuf" },
          { title: "freeCodeCamp Terraform Tutorial", url: "https://www.youtube.com/watch?v=SLB_c_ayRCo" },
          { title: "Jeff Geerling Ansible series", url: "https://www.youtube.com/playlist?list=PL2_OBreMn7FqZkvMYt6ATFfCbWy7zFiXI" }
        ]

    function App() {
      const [page, setPage] = useState('home');
      const [user, setUser] = useState(localStorage.getItem('roadmapUser') || '');
      const [nameInput, setNameInput] = useState('');
      const [statsUpdateTrigger, setStatsUpdateTrigger] = useState(0);
      const [activeRoleId, setActiveRoleId] = useState(null);

      // GitHub Gist Sync State
      const [gitToken, setGitToken] = useState(localStorage.getItem('roadmap_git_token') || '');
      const [gistId, setGistId] = useState(localStorage.getItem('roadmap_gist_id') || '');
      const [syncStatus, setSyncStatus] = useState('idle'); // 'idle', 'syncing', 'synced', 'error'
      const [syncError, setSyncError] = useState('');
      const [showSyncSettings, setShowSyncSettings] = useState(false);
      const [tokenInput, setTokenInput] = useState(localStorage.getItem('roadmap_git_token') || '');

      // Persist user sign-in state
      useEffect(() => {
        if (user) {
          localStorage.setItem('roadmapUser', user);
        } else {
          localStorage.removeItem('roadmapUser');
        }
      }, [user]);

      // Re-trigger stats updates when localstorage changes (like checking off items in sub-views)
      useEffect(() => {
        const handleStorageChange = () => {
          setStatsUpdateTrigger(prev => prev + 1);
        };
        window.addEventListener('storage', handleStorageChange);
        // Custom event dispatcher from the sub-renderer
        window.addEventListener('roadmapProgressUpdated', handleStorageChange);
        
        return () => {
          window.removeEventListener('storage', handleStorageChange);
          window.removeEventListener('roadmapProgressUpdated', handleStorageChange);
        };
      }, []);

      // Dynamic completion calculation helper for home screen dashboard cards
      const roadmapStats = useMemo(() => {
        if (!user) return {};

        const getStats = (id, weeksArray) => {
          if (!weeksArray) return { percent: 0, completed: 0, total: 0 };
          const progressKey = `${id}-progress-${user}`;
          const saved = localStorage.getItem(progressKey);
          const checked = saved ? JSON.parse(saved) : {};
          let total = 0;
          let completed = 0;

          weeksArray.forEach((week) => {
            if (week.topics) {
              week.topics.forEach((t, i) => {
                total++;
                if (checked[`${id}-${week.week}-${i}`]) completed++;
              });
            } else if (week.days) {
              week.days.forEach((d, dayIndex) => {
                d.tasks.forEach((task, taskIndex) => {
                  total++;
                  if (checked[`${id}-${week.week}-${dayIndex}-${taskIndex}`]) completed++;
                });
              });
            }
          });

          return {
            percent: total > 0 ? Math.round((completed / total) * 100) : 0,
            completed,
            total
          };
        };

        return {
          system: getStats('system', window.systemWeeks),
          ml: getStats('ml', window.mlWeeks),
          python: getStats('python', window.pythonWeeks),
          sql: getStats('sql', window.sqlWeeks),
          math: getStats('math', window.mathWeeks),
          dl: getStats('dl', window.dlWeeks),
          mlops: getStats('mlops', window.mlopsWeeks),
          java: getStats('java', window.javaWeeks),
          frontend: getStats('frontend', window.frontendWeeks),
          devops: getStats('devops', window.devopsWeeks)
        };
      }, [user, statsUpdateTrigger, page]); // Update stats when returning to Home page

      // Intercept localStorage calls in window to dispatch custom events (so checking boxes syncs in real-time)
      useEffect(() => {
        const originalSetItem = localStorage.setItem;
        localStorage.setItem = function(key, value) {
          originalSetItem.apply(this, arguments);
          if (key.includes('-progress-')) {
            window.dispatchEvent(new Event('roadmapProgressUpdated'));
          }
        };
      }, []);

      // Pull progress from GitHub Gist and merge with local storage
      const pullSync = async (token = gitToken, currentGistId = gistId) => {
        if (!token || !user) return;
        setSyncStatus('syncing');
        setSyncError('');
        try {
          // 1. Verify token scopes and user
          const userRes = await fetch('https://api.github.com/user', {
            headers: { Authorization: `token ${token}` }
          });
          if (!userRes.ok) {
            throw new Error('Invalid GitHub token. Please verify that your token is active.');
          }

          let targetGistId = currentGistId;

          // 2. If Gist ID is missing, search gists list for an existing synapse gist
          if (!targetGistId) {
            const gistsRes = await fetch('https://api.github.com/gists', {
              headers: { Authorization: `token ${token}` }
            });
            if (gistsRes.ok) {
              const gists = await gistsRes.json();
              const existingGist = gists.find(g => g.files && g.files['synapse_roadmap_progress.json']);
              if (existingGist) {
                targetGistId = existingGist.id;
                setGistId(targetGistId);
                localStorage.setItem('roadmap_gist_id', targetGistId);
              }
            }
          }

          // 3. If still no Gist ID, we will initialize a new private Gist
          if (!targetGistId) {
            const emptyPayload = { system: {}, ml: {}, python: {}, sql: {}, math: {}, dl: {}, mlops: {}, java: {}, frontend: {}, devops: {} };
            const newGistId = await saveGistToGitHub(token, null, emptyPayload);
            targetGistId = newGistId;
            setGistId(targetGistId);
            localStorage.setItem('roadmap_gist_id', targetGistId);
            setSyncStatus('synced');
            return;
          }

          // 4. Retrieve Gist files
          const gistRes = await fetch(`https://api.github.com/gists/${targetGistId}?t=${Date.now()}`, {
            headers: { 
              Authorization: `token ${token}`
            }
          });
          if (!gistRes.ok) {
            throw new Error('Could not access Gist. It might have been deleted.');
          }
          const gistData = await gistRes.json();
          const contentStr = gistData.files['synapse_roadmap_progress.json']?.content;

          if (contentStr) {
            const remoteProgress = JSON.parse(contentStr);
            const roadmaps = ['system', 'ml', 'python', 'sql', 'math', 'dl', 'mlops', 'java', 'frontend', 'devops'];
            let mergedAny = false;

            // Merge local and remote check lists
            roadmaps.forEach(rId => {
              const localKey = `${rId}-progress-${user}`;
              const localSaved = localStorage.getItem(localKey);
              const localChecked = localSaved ? JSON.parse(localSaved) : {};
              const remoteChecked = remoteProgress[rId] || {};

              // Safe union merge (keeps checked if true in local OR remote)
              const merged = { ...localChecked };
              Object.keys(remoteChecked).forEach(key => {
                if (remoteChecked[key]) {
                  merged[key] = true;
                }
              });

              if (JSON.stringify(localChecked) !== JSON.stringify(merged)) {
                localStorage.setItem(localKey, JSON.stringify(merged));
                mergedAny = true;
              }
            });

            if (mergedAny) {
              setStatsUpdateTrigger(prev => prev + 1);
              window.dispatchEvent(new Event('roadmapProgressUpdated'));
            }
          }
          setSyncStatus('synced');
        } catch (err) {
          setSyncStatus('error');
          setSyncError(err.message || 'Synchronization failed.');
        }
      };

      // Helper to execute Gist PATCH/POST calls
      const saveGistToGitHub = async (token, currentGistId, data) => {
        const url = currentGistId ? `https://api.github.com/gists/${currentGistId}` : 'https://api.github.com/gists';
        const method = currentGistId ? 'PATCH' : 'POST';
        const body = {
          description: 'Synapse Roadmap Progress Sync',
          public: false,
          files: {
            'synapse_roadmap_progress.json': {
              content: JSON.stringify(data, null, 2)
            }
          }
        };

        const res = await fetch(url, {
          method,
          headers: {
            Authorization: `token ${token}`,
            Accept: 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(body)
        });
        if (!res.ok) {
          throw new Error('Gist API update failed.');
        }
        const gist = await res.json();
        return gist.id;
      };

      // Push local progress state to GitHub Gist
      const pushSync = async () => {
        if (!gitToken || !user) return;
        setSyncStatus('syncing');
        try {
          const payload = {
            system: JSON.parse(localStorage.getItem(`system-progress-${user}`) || '{}'),
            ml: JSON.parse(localStorage.getItem(`ml-progress-${user}`) || '{}'),
            python: JSON.parse(localStorage.getItem(`python-progress-${user}`) || '{}'),
            sql: JSON.parse(localStorage.getItem(`sql-progress-${user}`) || '{}'),
            math: JSON.parse(localStorage.getItem(`math-progress-${user}`) || '{}'),
            dl: JSON.parse(localStorage.getItem(`dl-progress-${user}`) || '{}'),
            mlops: JSON.parse(localStorage.getItem(`mlops-progress-${user}`) || '{}'),
            java: JSON.parse(localStorage.getItem(`java-progress-${user}`) || '{}'),
            frontend: JSON.parse(localStorage.getItem(`frontend-progress-${user}`) || '{}'),
            devops: JSON.parse(localStorage.getItem(`devops-progress-${user}`) || '{}')
          };
          const newGistId = await saveGistToGitHub(gitToken, gistId, payload);
          if (newGistId !== gistId) {
            setGistId(newGistId);
            localStorage.setItem('roadmap_gist_id', newGistId);
          }
          setSyncStatus('synced');
        } catch (err) {
          setSyncStatus('error');
          setSyncError(err.message || 'Gist update upload failed.');
        }
      };

      // Link new token and pull data
      const handleLinkToken = async () => {
        if (!tokenInput.trim()) return;
        setSyncStatus('syncing');
        try {
          const cleanToken = tokenInput.trim();
          localStorage.setItem('roadmap_git_token', cleanToken);
          setGitToken(cleanToken);

          // Clear Gist ID to trigger lookup/creation on fresh token link
          localStorage.removeItem('roadmap_gist_id');
          setGistId('');

          await pullSync(cleanToken, '');
        } catch (e) {
          setSyncStatus('error');
          setSyncError(e.message);
        }
      };

      // Trigger automatic background push on changes (debounced by 2 seconds)
      useEffect(() => {
        if (!gitToken || !user || statsUpdateTrigger === 0) return;

        setSyncStatus('syncing');
        const delayDebounceFn = setTimeout(() => {
          pushSync();
        }, 2000);

        return () => clearTimeout(delayDebounceFn);
      }, [statsUpdateTrigger]);

      // Pull progress data on load when logged in
      useEffect(() => {
        if (user && gitToken) {
          pullSync(gitToken, gistId);
        }
      }, [user]);

      if (!user) {
        return (
          <div style={{ 
            minHeight: '100vh', 
            background: '#050508', 
            color: '#E8E8F0', 
            display: 'flex', 
            alignItems: 'center', 
            justifyContent: 'center', 
            padding: '24px',
            position: 'relative',
            overflow: 'hidden'
          }}>
            {/* Background glowing orbs */}
            <div className="glow-orb" style={{ top: '15%', left: '10%', width: 250, height: 250, background: '#7C3AED' }} />
            <div className="glow-orb" style={{ bottom: '15%', right: '10%', width: 300, height: 300, background: '#2563EB' }} />

            <div style={{ 
              width: '100%', 
              maxWidth: 480, 
              textAlign: 'center', 
              background: 'rgba(16, 18, 28, 0.75)', 
              backdropFilter: 'blur(20px)',
              border: '1px solid rgba(30, 34, 53, 0.8)', 
              borderRadius: 24, 
              padding: '44px 36px',
              boxShadow: '0 20px 50px rgba(0, 0, 0, 0.5)',
              position: 'relative',
              zIndex: 1
            }}>
              <div style={{ 
                fontSize: 10, 
                letterSpacing: 4, 
                color: '#3B82F6', 
                marginBottom: 16, 
                fontWeight: 900,
                textTransform: 'uppercase'
              }}>
                Synapse Portal
              </div>
              <h2 style={{ fontSize: 30, fontWeight: 900, marginBottom: 12, color: '#FFF' }}>Begin Your Journey</h2>
              <p style={{ fontSize: 13.5, color: '#9CA3AF', lineHeight: 1.6, marginBottom: 28 }}>
                Enter your name to initialize a personalized career transition dashboard. Progress is stored securely in your browser's local cache.
              </p>
              
              <div style={{ position: 'relative', marginBottom: 20 }}>
                <input
                  type="text"
                  value={nameInput}
                  onChange={(e) => setNameInput(e.target.value)}
                  placeholder="Enter your name"
                  onKeyDown={(e) => {
                    if (e.key === 'Enter' && nameInput.trim()) {
                      setUser(nameInput.trim());
                    }
                  }}
                  style={{ 
                    width: '100%', 
                    padding: '16px 20px', 
                    borderRadius: 12, 
                    border: '1px solid #22273D', 
                    background: '#08090E', 
                    color: '#FFF', 
                    fontSize: 14, 
                    outline: 'none',
                    boxSizing: 'border-box'
                  }}
                  onFocus={(e) => e.target.style.borderColor = '#3B82F6'}
                  onBlur={(e) => e.target.style.borderColor = '#22273D'}
                />
              </div>

              <button
                onClick={() => setUser(nameInput.trim())}
                disabled={!nameInput.trim()}
                style={{ 
                  width: '100%', 
                  padding: '16px 20px', 
                  borderRadius: 12, 
                  border: 'none', 
                  background: nameInput.trim() ? 'linear-gradient(90deg, #2563EB 0%, #7C3AED 100%)' : '#1A1C28', 
                  color: nameInput.trim() ? '#FFF' : '#4B5563', 
                  fontWeight: 800, 
                  cursor: nameInput.trim() ? 'pointer' : 'not-allowed',
                  boxShadow: nameInput.trim() ? '0 4px 15px rgba(59, 130, 246, 0.4)' : 'none',
                  transform: nameInput.trim() ? 'scale(1)' : 'none'
                }}
                onMouseEnter={(e) => {
                  if (nameInput.trim()) e.target.style.transform = 'translateY(-1px)';
                }}
                onMouseLeave={(e) => {
                  e.target.style.transform = 'translateY(0)';
                }}
              >
                Sign In
              </button>
            </div>
          </div>
        );
      }

      return (
        <div style={{ minHeight: '100vh', background: '#050508', color: '#E8E8F0', padding: '16px' }}>
          <div style={{ maxWidth: 1080, margin: '0 auto' }}>
            
            {/* Main Header / Top Navigation bar */}
            <div style={{ 
              display: 'flex', 
              alignItems: 'center', 
              justifyContent: 'space-between', 
              flexWrap: 'wrap', 
              gap: 16, 
              padding: '16px 0',
              borderBottom: '1px solid #10121C',
              marginBottom: 24
